name: RadioChatter
module: skills.radio_chatter.main
category: general
description:
  en: Randomly playback radio chatter over time. Customize the participants and their voices.
  de: Spielt zufällige Funkgespräche ab. Passe die Teilnehmer und ihre Stimmen an.
examples:
  - question:
      en: What is the status of the radio?
      de: Was ist der Status des Funkgeräts?
    answer:
      en: The radio is currently turned off.
      de: Das Funkgerät ist derzeit ausgeschaltet.
  - question:
      en: Please turn the radio on.
      de: Bitte schalte das Funkgerät ein.
    answer:
      en: The radio is now turned on.
      de: Das Funkgerät wurde eingeschaltet.
custom_properties:
  - id: prompt
    name: Prompt for message generation
    hint: A prompt used on voice change to generate a new personality. Leave empty to disable.
    required: false
    value: 'Conversations happen in the Star Citizen universe. Never mention Port
      Olisar.

      Take known facts about items, factions, manufactures, locations and ships into
      account.

      Also the missions that are available in general should influence the conversations
      topic.

      Conversations should be casual and about everyday content between people that
      know each other for ages.

      Conversations should have a clear topic and should not bounce from topic to
      topic while staying in the lore of Star Citizen.

      Things are not "new" everytime. So dont start each message with "Hey, heard
      about that new..."


      While the conversation is based in the Star Citizen universe, it should never
      be mentioned, as it is in the perspective of people in the verse that see it
      as real life.'
    property_type: textarea
  - id: voices
    name: Available voices
    hint: The voices used in the radio chatter
    value: []
    required: false
    property_type: voice_selection
    options:
      - label: "multiple"
        value: true
  - id: interval_min
    name: Min interval
    hint: The minimum time in seconds between radio chatter. This is also the time used until the first chatter event occurs.
    value: 60
    required: true
    property_type: number
  - id: interval_max
    name: Max interval
    hint: The maximum time in seconds between radio chatter.
    value: 600
    required: true
    property_type: number
  - id: messages_min
    name: Min messages
    hint: The minimum number of messages to play for on chatter event.
    value: 1
    required: true
    property_type: number
  - id: messages_max
    name: Max messages
    hint: The maximum number of messages to play for on chatter event.
    value: 5
    required: true
    property_type: number
  - id: participants_min
    name: Min participants
    hint: The minimum number of participants in the chatter.
    value: 2
    required: true
    property_type: number
  - id: participants_max
    name: Max participants
    hint: The maximum number of participants in the chatter.
    value: 3
    required: true
    property_type: number
  - id: force_radio_sound
    name: Radio effect
    hint: Overwrites wingman sound effects for radio chatter with selected radio effects. Needs at least one valid value in "Available radio effects".
    value: True
    required: false
    property_type: boolean
  - id: radio_sounds
    name: Available radio effects
    hint: A list of radio effects separated by commas that are randomly used when "Force radio effects" is enabled. Possible values are "low", "medium" and "high".
    value: "low, medium"
    required: false
    property_type: string
  - id: auto_start
    name: Auto start
    hint: Automatically start the radio chatter with your Wingman.
    value: False
    required: false
    property_type: boolean
  - id: volume
    name: Volume
    hint: The volume (relative to the Wingman's volume) of the radio chatter. Must be between 0.0 (silent) and 1.0 (same volume as Wingman).
    value: 0.5
    required: false
    property_type: slider
    options:
      - label: "min"
        value: 0.0
      - label: "max"
        value: 1.0
      - label: "step"
        value: 0.05
  - id: volume_background_modifier
    name: Background volume modifier
    hint: The volume (relative to the radio chatter volume) that is used when the wingman is playing back sound. Must be between 0.0 (silent) and 1.0 (same volume as radio chatter).
    value: 0.25
    required: false
    property_type: slider
    options:
     - label: "min"
       value: 0.0
     - label: "max"
       value: 1.0
     - label: "step"
       value: 0.05
  - id: print_chatter
    name: Print chatter
    hint: Print the generated chatter to message overview.
    value: True
    required: false
    property_type: boolean
  - id: radio_knowledge
    name: Radio knowledge
    hint: If enabled, the radio chatter messages will be added to the wingman conversation. This way you can talk with your wingman about the radio chatter and engage in a conversation.
    value: False
    required: false
    property_type: boolean
  - id: use_beeps
    name: Use beeps
    hint: Use beeps to indicate the start and end of a radio chatter messages.
    value: False
    required: false
    property_type: boolean
